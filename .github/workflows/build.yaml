name: Build
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cvc5
        uses: ./.github/actions/setup-cvc5

      - uses: Swatinem/rust-cache@v2

      - name: Run cargo check
        run: cargo check --all-features

  test:
    name: Test Suite
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cvc5
        uses: ./.github/actions/setup-cvc5
        with:
          build-dynamic: 'true'

      - uses: Swatinem/rust-cache@v2

      - name: Run tests (static linking)
        run: cargo test --features static,parser

      - name: Run tests (dynamic linking)
        run: cargo test --features parser
        env:
          CVC5_LIB_DIR: ${{ github.workspace }}/cvc5-sys/cvc5/build-dynamic/install/lib
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/cvc5-sys/cvc5/build-dynamic/install/lib
          LD_LIBRARY_PATH: ${{ github.workspace }}/cvc5-sys/cvc5/build-dynamic/install/lib

  lints:
    name: Lints
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup cvc5
        uses: ./.github/actions/setup-cvc5

      - uses: Swatinem/rust-cache@v2

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

      - name: Run cargo clippy
        run: cargo clippy --all-features --tests -- -D warnings

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cvc5
        uses: ./.github/actions/setup-cvc5

      - name: Build documentation
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
